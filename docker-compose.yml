version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cybersec-postgres
    environment:
      POSTGRES_DB: cybersec
      POSTGRES_USER: cybersec
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cybersec -d cybersec']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybersec-backend
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cybersec:password@postgres:5432/cybersec
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'python', '-c', "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cybersec-frontend
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    name: cybersec_postgres_data
